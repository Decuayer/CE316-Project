name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Verify tag matches package.json ──────────────────────────────────────
  verify:
    name: Verify tag matches package.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: ./.github/scripts/verify-tag-version.sh "${GITHUB_REF_NAME}"

  # ── 2. Build installers on each platform ────────────────────────────────────
  build:
    name: Build ${{ matrix.name }} installer
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-14          # Apple Silicon runner
            name: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Skip macOS code-signing in CI (no Apple Developer cert available)
      - name: Build and package (macOS — no signing)
        if: runner.os == 'macOS'
        run: npm run dist -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # Windows: regenerate ICO from PNG to guarantee 256x256 minimum
      # (ImageMagick is pre-installed on windows-latest runners)
      - name: Generate proper 256x256 ICO (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # ImageMagick on Windows runners is available as 'magick'
          magick build/icon.png `
            -define icon:auto-resize=256,128,64,48,32,16 `
            build/icon.ico
          Write-Host "Generated icon.ico size: $((Get-Item build/icon.ico).Length) bytes"

      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        run: npm run dist -- --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 7

  # ── 3. Publish GitHub Release ───────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes template)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "IAE ${{ github.ref_name }} — Working Prototype"
          draft: false
          prerelease: true
          generate_release_notes: true
          body: |
            ## IAE — Integrated Assignment Environment
            ### ${{ github.ref_name }} · Working Prototype

            This is a **working prototype** release of IAE, an Electron-based desktop application
            for automated grading and evaluation of student code submissions.

            ---

            ### ✨ What's in this release
            <!-- Auto-generated commit log is appended below -->

            ### 📥 Installation

            | Platform | File | Notes |
            |----------|------|-------|
            | **macOS (Apple Silicon)** | `.dmg` | Drag to Applications. If blocked by Gatekeeper: right-click → Open |
            | **macOS (Intel)** | `.dmg` (x64) | Same as above |
            | **Windows** | `.exe` | Run the NSIS installer |

            > **macOS note:** This build is not notarized. On first launch, right-click the app and choose **Open** to bypass Gatekeeper.

            ### ⚙️ Requirements
            - The relevant compiler must be installed and on PATH (gcc, javac, python3, etc.)
            - Node.js is **not** required — the app is fully self-contained

            ---
          fail_on_unmatched_files: true
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.zip
