appId: com.ce316.iae
productName: "Integrated Assignment Environment"
directories:
  buildResources: build
  output: release
files:
  - dist
  - dist-electron
  - node_modules/better-sqlite3/**/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "IAE"
